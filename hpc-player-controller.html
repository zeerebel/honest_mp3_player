<!-- ==================================================
     CF MUSIC PLAYER mp3_v4 — Controller
     - Controls the global #hpc-global <audio> element (rendered in wp_footer)
     - No <audio> tag here; this is UI + JS only
     - Waits for #hpc-global to exist before attaching
     - Syncs UI to current playback state on every page load
     ================================================== -->
<style>
  .cfmp-root {
    --cfmp-accent  : #e03030;
    --cfmp-text    : rgba(255,255,255,0.95);
    --cfmp-subtext : rgba(255,255,255,0.6);
    --cfmp-track   : rgba(255,255,255,0.22);
    --cfmp-fill    : rgba(255,255,255,0.85);

    background    : transparent;
    border-radius : 20px;
    max-width     : 480px;
    margin        : 0 auto;
    font-family   : -apple-system, 'Helvetica Neue', Arial, sans-serif;
    -webkit-user-select : none;
    user-select         : none;
  }

  .cfmp-body { padding : 32px 28px 26px; }

  .cfmp-info { text-align : center; margin-bottom : 24px; }

  .cfmp-title {
    color         : var(--cfmp-text);
    font-size     : 17px;
    font-weight   : 600;
    letter-spacing: 0.02em;
    margin        : 0 0 5px 0;
    line-height   : 1.3;
    text-shadow   : 0 1px 8px rgba(0,0,0,0.45);
  }

  .cfmp-artist {
    color          : var(--cfmp-subtext);
    font-size      : 12px;
    letter-spacing : 0.12em;
    text-transform : uppercase;
    margin         : 0;
    text-shadow    : 0 1px 4px rgba(0,0,0,0.35);
  }

  .cfmp-controls {
    display         : flex;
    align-items     : center;
    justify-content : center;
    gap             : 44px;
    margin-bottom   : 24px;
  }

  .cfmp-btn {
    background                   : none;
    border                       : none;
    padding                      : 6px;
    cursor                       : pointer;
    color                        : rgba(255,255,255,0.88);
    display                      : flex;
    align-items                  : center;
    justify-content              : center;
    transition                   : color 0.15s ease, transform 0.15s ease;
    outline                      : none;
    -webkit-tap-highlight-color: transparent;
    filter                       : drop-shadow(0 1px 5px rgba(0,0,0,0.45));
  }
  .cfmp-btn:hover { color : #fff; transform : scale(1.12); }
  .cfmp-btn svg { display : block; fill : currentColor; }
  .cfmp-btn-prev svg, .cfmp-btn-next svg { width : 22px; height : 22px; }
  .cfmp-btn-play svg { width : 30px; height : 30px; }

  .cfmp-cur-inline {
    color          : var(--cfmp-subtext);
    font-size      : 12px;
    letter-spacing : 0.05em;
    font-variant-numeric : tabular-nums;
    text-shadow    : 0 1px 4px rgba(0,0,0,0.35);
    min-width      : 36px;
    text-align     : left;
  }

  .cfmp-scrubber {
    position    : relative;
    height      : 24px;
    display     : flex;
    align-items : center;
    cursor      : pointer;
    margin-bottom : 10px;
    -webkit-tap-highlight-color: transparent;
  }

  .cfmp-track {
    position : relative;
    width    : 100%;
    height   : 2px;
    background: var(--cfmp-track);
    border-radius: 2px;
  }

  .cfmp-fill {
    position : absolute;
    top : 0; left : 0;
    height : 100%;
    width : 0%;
    background : var(--cfmp-fill);
    border-radius : 2px;
    pointer-events: none;
  }

  .cfmp-handle {
    position : absolute;
    top : 50%; left : 0%;
    transform : translate(-50%, -50%);
    width : 13px; height : 13px;
    background : var(--cfmp-accent);
    border-radius : 50%;
    pointer-events: none;
    box-shadow : 0 0 8px rgba(224,48,48,0.55);
  }

  .cfmp-time {
    display : flex;
    align-items : center;
    justify-content : flex-end;
    color : var(--cfmp-subtext);
    font-size : 12px;
    letter-spacing : 0.05em;
    font-variant-numeric : tabular-nums;
    text-shadow : 0 1px 4px rgba(0,0,0,0.35);
  }

  .cfmp-time-right {
    display     : flex;
    align-items : center;
    gap         : 12px;
  }

  .cfmp-vol-wrap {
    position : relative;
    display  : flex;
    align-items: center;
  }

  .cfmp-vol-btn {
    background : none !important;
    border     : none !important;
    padding    : 4px !important;
    cursor     : pointer;
    color      : rgba(255,255,255,0.8);
    display    : flex;
    align-items: center;
    outline    : none;
    -webkit-tap-highlight-color: transparent;
    filter     : drop-shadow(0 1px 4px rgba(0,0,0,0.45));
    transition : color 0.15s ease, transform 0.15s ease;
  }
  .cfmp-vol-btn:hover { color : #fff; transform: scale(1.1); }
  .cfmp-vol-btn.is-open { color : #fff; }
  .cfmp-vol-btn svg   { width : 20px !important; height : 20px !important; fill : currentColor; display : block; }

  .cfmp-vol-pop {
    position : absolute;
    bottom   : calc(100% + 12px);
    left     : 50%;
    transform: translateX(-50%) translateY(8px) scale(0.92);
    transform-origin: bottom center;
    background: rgba(0, 0, 0, 0.5);
    border   : 1px solid rgba(255,255,255,0.10);
    border-radius : 14px;
    padding  : 16px 0 14px;
    box-shadow : 0 12px 32px rgba(0,0,0,0.45);
    -webkit-backdrop-filter : blur(14px);
    backdrop-filter : blur(14px);
    display  : flex;
    flex-direction : column;
    align-items : center;
    gap      : 10px;
    opacity  : 0;
    pointer-events : none;
    transition : opacity 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                 transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index  : 10;
  }
  .cfmp-vol-pop.is-open {
    opacity  : 1;
    transform: translateX(-50%) translateY(0) scale(1);
    pointer-events : auto;
  }
  .cfmp-vol-pop::after {
    content : '';
    position: absolute;
    top     : 100%;
    left    : 50%;
    transform : translateX(-50%);
    border  : 6px solid transparent;
    border-top-color : rgba(0, 0, 0, 0.5);
  }

  .cfmp-vol-pct {
    color      : var(--cfmp-subtext);
    font-size  : 11px;
    font-variant-numeric : tabular-nums;
    letter-spacing : 0.04em;
    min-width  : 30px;
    text-align : center;
  }

  .cfmp-vol-scrubber {
    position   : relative;
    width      : 22px;
    height     : 110px;
    display    : flex;
    justify-content : center;
    cursor     : pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action : none;
  }
  .cfmp-vol-track {
    position : relative;
    width    : 4px;
    height   : 100%;
    background : var(--cfmp-track);
    border-radius: 4px;
  }
  .cfmp-vol-fill {
    position : absolute;
    left : 0; bottom : 0;
    width : 100%;
    height : 80%;
    background : var(--cfmp-fill);
    border-radius : 4px;
    pointer-events: none;
  }
  .cfmp-vol-handle {
    position : absolute;
    left : 50%;
    bottom : 80%;
    transform : translate(-50%, 50%);
    width : 13px; height : 13px;
    background : var(--cfmp-accent);
    border-radius : 50%;
    pointer-events: none;
    box-shadow : 0 0 8px rgba(224,48,48,0.55);
  }
</style>

<div class="cfmp-root" id="cfmp-root">
  <div class="cfmp-body">

    <div class="cfmp-controls">
      <button class="cfmp-btn cfmp-btn-prev" id="cfmp-prev" aria-label="Previous">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"></path></svg>
      </button>
      <button class="cfmp-btn cfmp-btn-play" id="cfmp-play" aria-label="Play">
        <svg viewBox="0 0 24 24" id="cfmp-play-svg"><path d="M8 5v14l11-7z"></path></svg>
      </button>
      <button class="cfmp-btn cfmp-btn-next" id="cfmp-next" aria-label="Next">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"></path></svg>
      </button>
      <span class="cfmp-cur-inline" id="cfmp-cur">0:00</span>
    </div>

    <div class="cfmp-scrubber" id="cfmp-scrubber">
      <div class="cfmp-track">
        <div class="cfmp-fill" id="cfmp-fill"></div>
        <div class="cfmp-handle" id="cfmp-handle"></div>
      </div>
    </div>

    <div class="cfmp-time">
      <div class="cfmp-time-right">
        <span id="cfmp-dur">0:00</span>
        <div class="cfmp-vol-wrap">
          <div class="cfmp-vol-pop" id="cfmp-vol-pop">
            <span class="cfmp-vol-pct" id="cfmp-vol-pct">80</span>
            <div class="cfmp-vol-scrubber" id="cfmp-vol-scrubber">
              <div class="cfmp-vol-track">
                <div class="cfmp-vol-fill" id="cfmp-vol-fill"></div>
                <div class="cfmp-vol-handle" id="cfmp-vol-handle"></div>
              </div>
            </div>
          </div>
          <button class="cfmp-vol-btn" id="cfmp-vol-btn" aria-label="Volume">
            <svg id="cfmp-vol-svg" viewBox="0 0 24 24">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  var playBtn  = document.getElementById('cfmp-play');
  var playSvg  = document.getElementById('cfmp-play-svg');
  var prevBtn  = document.getElementById('cfmp-prev');
  var nextBtn  = document.getElementById('cfmp-next');
  var scrubber = document.getElementById('cfmp-scrubber');
  var fill     = document.getElementById('cfmp-fill');
  var handle   = document.getElementById('cfmp-handle');
  var curEl    = document.getElementById('cfmp-cur');
  var durEl    = document.getElementById('cfmp-dur');

  var volBtn      = document.getElementById('cfmp-vol-btn');
  var volSvg      = document.getElementById('cfmp-vol-svg');
  var volPop      = document.getElementById('cfmp-vol-pop');
  var volScrubber = document.getElementById('cfmp-vol-scrubber');
  var volFill     = document.getElementById('cfmp-vol-fill');
  var volHandle   = document.getElementById('cfmp-vol-handle');
  var volPct      = document.getElementById('cfmp-vol-pct');

  var PLAY_PATH  = '<path d="M8 5v14l11-7z"/>';
  var PAUSE_PATH = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

  var VOL_HIGH = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"/>';
  var VOL_LOW  = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z"/>';
  var VOL_MUTE = '<path d="M16.5 12A4.5 4.5 0 0 0 14 8v2.18l2.45 2.45c.03-.2.05-.41.05-.63zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.93 8.93 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73 12 10.73 4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>';

  function formatTime(s) {
    if (isNaN(s) || !isFinite(s)) return '0:00';
    var m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function setProgress(pct) {
    fill.style.width  = pct + '%';
    handle.style.left = pct + '%';
  }
  function setVolumeUI(pct) {
    volFill.style.height   = pct + '%';
    volHandle.style.bottom = pct + '%';
    volPct.textContent     = Math.round(pct);
    if (pct === 0)     volSvg.innerHTML = VOL_MUTE;
    else if (pct < 50) volSvg.innerHTML = VOL_LOW;
    else               volSvg.innerHTML = VOL_HIGH;
  }

  // Wait for the global audio element rendered by wp_footer.
  var attempts = 0;
  var poll = setInterval(function () {
    var audio = document.getElementById('hpc-global');
    attempts++;
    if (audio) {
      clearInterval(poll);
      attach(audio);
    } else if (attempts >= 20) {
      clearInterval(poll);
    }
  }, 50);

  function attach(audio) {
    var isPlaying    = false;
    var dragging     = false;
    var draggingVol  = false;
    var lastVol      = 0.8;
    var autoplayDone = false;
    var autoMuted    = false; // true when muted ONLY to satisfy autoplay policy

    // sessionStorage fallback — restores position if the audio element was
    // re-created by a full page reload (i.e. Ajax page transitions off, or
    // user opened a fresh tab on the same session).
    var STORAGE_POS     = 'hpc-pos';
    var STORAGE_PLAYING = 'hpc-playing';
    var STORAGE_VOL     = 'hpc-volume';
    var lastSavedAt     = 0;
    var savedPlayingFlag = null;

    function readStorage(key) {
      try { return sessionStorage.getItem(key); } catch (e) { return null; }
    }
    function writeStorage(key, val) {
      try { sessionStorage.setItem(key, val); } catch (e) {}
    }
    function savePos(force) {
      var now = Date.now();
      if (!force && now - lastSavedAt < 1000) return;
      lastSavedAt = now;
      writeStorage(STORAGE_POS, String(audio.currentTime || 0));
      writeStorage(STORAGE_PLAYING, audio.paused ? '0' : '1');
    }
    function restoreFromStorage() {
      var sp = readStorage(STORAGE_PLAYING);
      if (sp === '1') savedPlayingFlag = true;
      else if (sp === '0') savedPlayingFlag = false;

      var savedVol = parseFloat(readStorage(STORAGE_VOL));
      if (!isNaN(savedVol) && savedVol >= 0 && savedVol <= 1) {
        audio.volume = savedVol;
        audio.muted  = (savedVol === 0);
      } else if (audio.currentTime < 0.5) {
        audio.volume = 0.8;
      }

      var savedPos = parseFloat(readStorage(STORAGE_POS));
      if (isNaN(savedPos) || savedPos <= 0) return;
      // Only restore if this is a fresh element — if audio is mid-playback
      // (Ajax transitions kept it alive) leave currentTime alone.
      if (audio.currentTime > 0.5) return;
      var doSeek = function () {
        if (audio.duration && savedPos < audio.duration - 1) {
          audio.currentTime = savedPos;
        }
      };
      if (audio.readyState >= 1) doSeek();
      else audio.addEventListener('loadedmetadata', doSeek, { once: true });
    }
    restoreFromStorage();

    function seekFromX(x) {
      var t = scrubber.querySelector('.cfmp-track');
      var r = t.getBoundingClientRect();
      var ratio = Math.max(0, Math.min(1, (x - r.left) / r.width));
      if (audio.duration) audio.currentTime = ratio * audio.duration;
    }
    function applyVolume(pct) {
      var v = Math.max(0, Math.min(100, Math.round(pct)));
      audio.volume = v / 100;
      audio.muted  = (v === 0);
      autoMuted    = false; // explicit volume action cancels auto-mute
      setVolumeUI(v);
      writeStorage(STORAGE_VOL, String(v / 100));
    }
    // Unmute the autoplay-muted stream on first interaction. Unmuting an
    // already-playing element does NOT require a user gesture, so this works
    // on mousemove/scroll where starting playback would not.
    function unmuteIfNeeded() {
      if (!autoMuted) return;
      autoMuted = false;
      audio.muted = (audio.volume === 0);
    }
    function setVolumeFromY(y) {
      var t = volScrubber.querySelector('.cfmp-vol-track');
      var r = t.getBoundingClientRect();
      var ratio = Math.max(0, Math.min(1, (r.bottom - y) / r.height));
      var pct = ratio * 100;
      if (pct > 0) lastVol = pct / 100;
      applyVolume(pct);
    }

    // Sync UI to current audio state immediately — playback may already be
    // running from a previous page.
    function syncFromAudio() {
      isPlaying = !audio.paused && !audio.ended;
      if (isPlaying) autoplayDone = true;
      // Inherited an auto-muted stream from a previous page (playing + muted
      // but intended volume > 0). Mark it so the next interaction unmutes.
      if (isPlaying && audio.muted && audio.volume > 0) autoMuted = true;

      var vol = (typeof audio.volume === 'number') ? audio.volume : 0.8;
      var displayMuted = audio.muted && !autoMuted; // auto-mute isn't "muted" to the user
      setVolumeUI(displayMuted ? 0 : vol * 100);

      if (audio.duration) {
        durEl.textContent = formatTime(audio.duration);
        setProgress((audio.currentTime / audio.duration) * 100);
      }
      curEl.textContent = formatTime(audio.currentTime || 0);
      playSvg.innerHTML = isPlaying ? PAUSE_PATH : PLAY_PATH;
    }
    syncFromAudio();

    function openVol()  { volPop.classList.add('is-open');    volBtn.classList.add('is-open'); }
    function closeVol() { volPop.classList.remove('is-open'); volBtn.classList.remove('is-open'); }
    function toggleVol() {
      if (volPop.classList.contains('is-open')) closeVol();
      else openVol();
    }

    volBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      toggleVol();
    });
    volPop.addEventListener('click', function (e) { e.stopPropagation(); });
    document.addEventListener('click', function () { closeVol(); });

    volScrubber.addEventListener('mousedown', function (e) {
      e.stopPropagation();
      draggingVol = true;
      setVolumeFromY(e.clientY);
    });
    document.addEventListener('mousemove', function (e) {
      if (draggingVol) setVolumeFromY(e.clientY);
    });
    document.addEventListener('mouseup', function () { draggingVol = false; });

    volScrubber.addEventListener('touchstart', function (e) {
      setVolumeFromY(e.touches[0].clientY);
    }, { passive: true });
    volScrubber.addEventListener('touchmove', function (e) {
      e.preventDefault();
      setVolumeFromY(e.touches[0].clientY);
    }, { passive: false });

    audio.addEventListener('loadedmetadata', function () {
      durEl.textContent = formatTime(audio.duration);
    });
    audio.addEventListener('timeupdate', function () {
      if (!audio.duration) return;
      setProgress((audio.currentTime / audio.duration) * 100);
      curEl.textContent = formatTime(audio.currentTime);
      savePos(false);
    });
    audio.addEventListener('ended', function () {
      isPlaying = false;
      playSvg.innerHTML = PLAY_PATH;
      setProgress(0);
      curEl.textContent = '0:00';
      writeStorage(STORAGE_POS, '0');
      writeStorage(STORAGE_PLAYING, '0');
    });
    audio.addEventListener('play',  function () { isPlaying = true;  playSvg.innerHTML = PAUSE_PATH; savePos(true); });
    audio.addEventListener('pause', function () { isPlaying = false; playSvg.innerHTML = PLAY_PATH;  savePos(true); });
    audio.addEventListener('volumechange', function () {
      var displayMuted = audio.muted && !autoMuted;
      setVolumeUI(displayMuted ? 0 : audio.volume * 100);
    });

    playBtn.addEventListener('click', function () {
      if (isPlaying) audio.pause();
      else           audio.play();
    });
    prevBtn.addEventListener('click', function () {
      audio.currentTime = 0;
      if (!isPlaying) audio.play();
    });
    nextBtn.addEventListener('click', function () {
      if (audio.duration) audio.currentTime = audio.duration;
    });

    scrubber.addEventListener('mousedown', function (e) {
      dragging = true; seekFromX(e.clientX);
    });
    document.addEventListener('mousemove', function (e) {
      if (dragging) seekFromX(e.clientX);
    });
    document.addEventListener('mouseup', function () { dragging = false; });
    scrubber.addEventListener('touchstart', function (e) {
      seekFromX(e.touches[0].clientX);
    }, { passive: true });
    scrubber.addEventListener('touchmove', function (e) {
      e.preventDefault(); seekFromX(e.touches[0].clientX);
    }, { passive: false });

    function tryAutoplay() {
      if (autoplayDone) return;
      // Always start MUTED. Browsers grant muted autoplay unconditionally,
      // so behavior is consistent across fresh visits AND refreshes — no
      // dependence on Chrome's MEI. The first user interaction (mousemove,
      // scroll, wheel, click, tap, keypress) unmutes the already-playing
      // stream, which needs no gesture.
      if (audio.volume > 0) { autoMuted = true; audio.muted = true; }
      var p = audio.play();
      if (!p || typeof p.then !== 'function') { autoplayDone = true; return; }
      p.then(function () {
        autoplayDone = true;
      }).catch(function () {
        // Even muted autoplay rejected (iOS Low Power Mode, locked-down
        // policy, etc.). Drop the auto-mute so startOnInteraction can do a
        // direct play() on the next gesture.
        autoMuted = false;
        audio.muted = (audio.volume === 0);
      });
    }
    function startOnInteraction() {
      if (autoplayDone && !autoMuted) return; // fully started + audible
      unmuteIfNeeded();
      if (!autoplayDone) {
        autoplayDone = true;
        var p = audio.play();
        if (p && typeof p.catch === 'function') p.catch(function () {});
      }
    }
    ['click','touchstart','pointerdown','keydown','scroll','wheel','mousemove'].forEach(function (evt) {
      window.addEventListener(evt, startOnInteraction, { capture: true, passive: true });
    });

    // Always attempt autoplay on attach — original behavior. Browsers that
    // block it (iOS Safari especially) fall through to startOnInteraction.
    if (!isPlaying) {
      if (audio.readyState >= 2) tryAutoplay();
      else audio.addEventListener('canplay', tryAutoplay, { once: true });
    }

    window.addEventListener('pagehide', function () { savePos(true); });
  }
})();
</script>
